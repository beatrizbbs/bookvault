name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint
        run: ruff check api --select E9,F63,F7,F82

      - name: Build API container
        run: ./scripts/build.sh --image-name bookvault-api --tag ci --context api

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate (all modules/environments)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t TF_DIRS < <(find terraform -type f -name '*.tf' -not -path '*/.terraform/*' -exec dirname {} \; | sort -u)
          for dir in "${TF_DIRS[@]}"; do
            echo "Validating ${dir}"
            terraform -chdir="${dir}" init -backend=false -input=false
            terraform -chdir="${dir}" validate
          done
